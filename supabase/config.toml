# Supabase local config — Dyafa (دافة)
# Single source of truth: docs/10-canonical-spec.md
# This is the LOCAL development config. Cloud project settings are managed separately.

project_id = "dyafa"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
# Postgres major version. Supabase ships 15 for local dev.
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

# Seed files applied (in order) by `supabase db reset`. seed.sql sets up
# reference data + demo users/hosts; seed_listings.sql adds demo listings,
# room types, photos, amenities, and a few completed bookings + reviews.
[db.seed]
enabled = true
sql_paths = ["./seed.sql", "./seed_listings.sql"]

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1:54321"

# Email testing inbox (Inbucket / Mailpit) for local dev.
[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
# 50 MiB cap for listing photos / kyc docs / statements.
file_size_limit = "50MiB"

[storage.buckets.listing-photos]
public = true
file_size_limit = "10MiB"
allowed_mime_types = ["image/webp", "image/jpeg", "image/png"]

[storage.buckets.avatars]
public = true
file_size_limit = "5MiB"
allowed_mime_types = ["image/webp", "image/jpeg", "image/png"]

[storage.buckets.kyc-docs]
public = false
file_size_limit = "10MiB"
allowed_mime_types = ["image/webp", "image/jpeg", "image/png", "application/pdf"]

[storage.buckets.payout-statements]
public = false
file_size_limit = "10MiB"
allowed_mime_types = ["application/pdf"]

[auth]
enabled = true
# Local-dev site URL (Expo / Next dev). Override per environment in cloud.
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = [
  "http://127.0.0.1:3000",
  "http://127.0.0.1:3001",
  "http://localhost:3000",
  "http://localhost:3001",
  "dyafa://pay/return",
  "exp://127.0.0.1:8081"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.email]
enable_signup = true
# LOCAL ONLY: no email confirmation gate so seeded/dev users can log in immediately.
# In cloud, set enable_confirmations = true (email verification is the host go-live gate, §10).
enable_confirmations = false
double_confirm_changes = true
secure_password_change = false

# Phone provider stub. Real +213 deliverability is best-effort (§10) — Twilio Verify in cloud.
# Phone is NOT a launch gate; email verification is. Disabled locally (no SMS provider).
[auth.sms]
enable_signup = true
enable_confirmations = false
template = "Your Dyafa verification code is {{ .Code }} ."

[auth.sms.twilio]
enabled = false
account_sid = ""
message_service_sid = ""
# Secret injected via env in cloud; never a real value in the repo.
auth_token = "env(SUPABASE_AUTH_SMS_TWILIO_AUTH_TOKEN)"

# Custom Access Token Hook — injects app_roles[] + host_id claims (§7 / doc 02).
# Implemented in 20260531120200_functions.sql as public.custom_access_token_hook.
[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"

[edge_runtime]
# Disabled for local dev until M2 — Edge Function (Deno) code is not written yet, and
# the runtime needs network access to fetch deno.land imports. Re-enable when functions land.
enabled = false
policy = "oneshot"
inspector_port = 8083

# Edge functions (implemented in M2+; declared here so `supabase functions serve` knows them).
[functions.create-booking]
verify_jwt = true

[functions.payments-create-checkout]
verify_jwt = true

[functions.payments-webhook-chargily]
# Public endpoint, secured by HMAC signature — must NOT verify JWT.
verify_jwt = false

[functions.payments-reconcile]
verify_jwt = false

[functions.accept-booking-request]
verify_jwt = true

[functions.cancel-booking]
verify_jwt = true

[functions.admin-actions]
verify_jwt = true

[functions.listing-image-process]
verify_jwt = false

[analytics]
enabled = false
